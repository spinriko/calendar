# Azure Pipeline for PTO Track

trigger:
  branches:
    include:
      - main

# pr:
#   branches:
#     include:
#       - main

variables:
  - group: "DevOps Automation Accounts"
  - group: "ASBDotNetWebApps-DEV"

  - name: "dotnetVersion"
    value: "8.0.100"

  - name: "efToolVersion"
    value: "8.0.*"

  - name: "typescriptPath"
    value: 'C:\admin\typescript-5.9.3.tgz'

  - name: "esbuildPath"
    value: 'C:\admin\esbuild-0.27.1.tgz'

  - name: "solutionPath"
    value: "**/pto.track.sln"

  - name: "projectPath"
    value: "**/pto.track.csproj"

  - name: "tempFolder"
    value: '$(deploymentFolder)_temp'

  - name: "deploymentBackupFolder"
    value: '$(deploymentFolder)_backup\'

  - name: "webConfigPath"
    value: '$(deploymentFolder)\web.config'

pool:
  name: DVO

stages:
  - stage: Build
    displayName: "Build Solution"
    jobs:
      - job: Build

        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0
            fetchTags: true

          - powershell: |
              & .\scripts\ci\version-tag.ps1 -BuildSourcesDirectory "$(Build.SourcesDirectory)"
            displayName: "Auto-increment version tag"
            failOnStderr: false
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

          - task: UseDotNet@2
            displayName: "Ensure .NET SDK 8.0 Installed"
            condition: false
            inputs:
              packageType: "sdk"
              useGlobalJson: true
              includePreviewVersions: false
              performMultiLevelLookup: true # checks for local installs

          - task: DotNetCoreCLI@2
            displayName: "Ensure dotnet-ef is Installed"
            condition: false
            inputs:
              command: "custom"
              custom: "tool"
              arguments: install --global dotnet-ef --version $(efToolVersion)

          - powershell: |
              $npmDir = Split-Path "$(npmPath)"
              $env:PATH = "$npmDir;$env:PATH"
              & "$(npmPath)" ci --prefix pto.track
            displayName: "Install frontend dependencies (pto.track)"

          - powershell: |
              $npmDir = Split-Path "$(npmPath)"
              $env:PATH = "$npmDir;$env:PATH"
              & "$(npmPath)" run build:js --prefix pto.track
            displayName: "Build frontend assets (pto.track)"

          - task: DotNetCoreCLI@2
            displayName: "Restore NuGet Packages"
            inputs:
              command: "restore"
              projects: "$(solutionPath)"

          - task: DotNetCoreCLI@2
            displayName: "Build Solution"
            inputs:
              command: "build"
              projects: "$(solutionPath)"
              arguments: "--configuration Release --no-restore"

          - task: PublishBuildArtifacts@1
            displayName: "Publish Build Artifacts"
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)"
              ArtifactName: "build-output"
              excludePathsPattern: "**/node_modules/**"

  - stage: Test
    displayName: "Run Tests and Coverage"
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - task: DownloadBuildArtifacts@0
            displayName: "Download Build Artifacts"
            inputs:
              artifactName: "build-output"
              downloadPath: "$(Build.SourcesDirectory)"

          - powershell: |
              New-Item -ItemType Directory -Force "$(Build.SourcesDirectory)/TestResults/coverage" | Out-Null
            displayName: "Ensure coverage output directory"
            failOnStderr: false

          - powershell: |
              node --version
            displayName: "Check Node.js on agent (Test Job)"
            condition: false

          - powershell: |
              npm --version
            displayName: "Check npm on agent (Test Job)"
            condition: false
            
          # Run JavaScript tests (Jest). Puppeteer Chromium download is skipped
          # to avoid headless/browser installs on restricted build agents.
          # add these back in after downgrading npm
          #- script: |
          #    npm ci --prefix pto.track.tests.js
          #  displayName: "Install JS test dependencies (pto.track.tests.js)"
          #  env:
          #    PUPPETEER_SKIP_DOWNLOAD: true

          #- script: |
          #    npm test --prefix pto.track.tests.js --silent
          #  displayName: "Run JavaScript tests (pto.track.tests.js)"
          #  env:
          #    PUPPETEER_SKIP_DOWNLOAD: true

          - task: DotNetCoreCLI@2
            displayName: "Test Services Layer"
            inputs:
              testRunTitle: "Test Services Layer"
              command: "test"
              projects: "**/pto.track.services.tests.csproj"
              arguments: '--configuration Release --no-build --logger "trx;LogFileName=services_tests.trx" --results-directory "$(Build.SourcesDirectory)\TestResults\services" --collect:"XPlat Code Coverage"'
              publishTestResults: false # handled in arguments

          - task: DotNetCoreCLI@2
            displayName: "Test Application Layer"
            inputs:
              testRunTitle: "Test Application Layer"
              command: "test"
              projects: "**/pto.track.tests.csproj"
              arguments: '--configuration Release --no-build --logger "trx;LogFileName=app_tests.trx" --results-directory "$(Build.SourcesDirectory)\TestResults\app" --collect:"XPlat Code Coverage"'
              publishTestResults: false # handled in arguments

          - task: DotNetCoreCLI@2
            displayName: "Test Data Layer"
            inputs:
              testRunTitle: "Test Data Layer"
              command: "test"
              projects: "**/pto.track.data.tests.csproj"
              arguments: '--configuration Release --no-build --logger "trx;LogFileName=data_tests.trx" --results-directory "$(Build.SourcesDirectory)\TestResults\data" --collect:"XPlat Code Coverage"'
              publishTestResults: false # handled in arguments

          - powershell: |
              & .\scripts\ci\coverage-merge.ps1 -SourcesDirectory "$(Build.SourcesDirectory)"
            displayName: "Merge coverage with ReportGenerator"
            failOnStderr: false
          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "VSTest"
              testResultsFiles: "**/TestResults/**/*.trx"
              mergeTestResults: true
              testRunTitle: "Dotnet Tests"

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: "Cobertura"
              summaryFileLocation: "$(Build.SourcesDirectory)/TestResults/coverage-merged/Cobertura.xml"
              failIfCoverageEmpty: true

          - task: PublishBuildArtifacts@1
            condition: false
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/pto.track.tests.js/save-results.html"
              artifactName: "JavaScriptTestReport"
              publishLocation: "Container"

  - stage: Analyze
    displayName: "Run Analyzers and Metrics"
    dependsOn: Test
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['forceDeploy'], 'true')))
    jobs:
      - job: Analyze
        steps:
          - task: DownloadBuildArtifacts@0
            displayName: "Download Build Artifacts"
            inputs:
              artifactName: "build-output"
              downloadPath: "$(Build.SourcesDirectory)"

          - task: PowerShell@2
            displayName: "Run Roslyn Analyzers"
            inputs:
              filePath: "./scripts/run-analyzers.ps1"
              arguments: "-Execute"

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/artifacts/analyzers"
              artifactName: "analyzers"
              publishLocation: "Container"

          - task: DotNetCoreCLI@2
            displayName: "Build metrics-runner (console)"
            inputs:
              command: "build"
              projects: "**/metrics-runner.csproj"
              arguments: "--configuration Release"

          - task: DotNetCoreCLI@2
            displayName: "Run metrics-runner (console)"
            inputs:
              command: "run"
              projects: "**/metrics-runner"
              arguments: "-- '$(Build.SourcesDirectory)'"

          - task: PowerShell@2
            displayName: "Generate metrics HTML report"
            inputs:
              filePath: "./scripts/ci/metrics-report.ps1"
              arguments: "-MetricsJsonPath '$(System.DefaultWorkingDirectory)/artifacts/metrics/metrics.json' -OutputDirectory '$(System.DefaultWorkingDirectory)/artifacts/metrics-report'"

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/artifacts/metrics"
              artifactName: "metrics"
              publishLocation: "Container"

          - task: PublishBuildArtifacts@1
            displayName: "Publish metrics HTML report"
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/artifacts/metrics-report"
              artifactName: "metrics-report"
              publishLocation: "Container"

  - stage: Publish
    displayName: "Publish Standalone App"
    dependsOn: Analyze
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['forceDeploy'], 'true')))
    jobs:
      - job: Publish
        steps:
          - task: DownloadBuildArtifacts@0
            displayName: "Download Build Artifacts"
            inputs:
              artifactName: "build-output"
              downloadPath: "$(Build.SourcesDirectory)"

          - powershell: |
              $projPath = @(Get-ChildItem -Path "$(Build.SourcesDirectory)" -Filter "pto.track.csproj" -Recurse)[0].FullName
              Write-Host "Found project: $projPath"
              & dotnet publish $projPath --configuration Release --framework net8.0 --runtime win-x64 --self-contained true --output $(Build.ArtifactStagingDirectory)/publish --no-build
            displayName: "Package Self-Contained App from Built Binaries"

          - powershell: |
              $source = "$(Build.SourcesDirectory)/scripts/release"
              $dest = "$(Build.ArtifactStagingDirectory)/publish/scripts/release"
              if (-not (Test-Path $source)) {
                Write-Error "Source scripts folder missing: $source"
              }
              New-Item -ItemType Directory -Force -Path $dest | Out-Null
              Copy-Item -Path "$source/*" -Destination $dest -Recurse -Force
              if (-not (Test-Path "$dest/iis-prereq-check.ps1")) {
                Write-Error "Expected script not found at $dest/iis-prereq-check.ps1"
              }
              Write-Host "Release scripts copied to artifact payload: $dest"
              Get-ChildItem -Recurse $dest | Select-Object FullName
            displayName: "Package release scripts"

          - task: PublishBuildArtifacts@1
            displayName: "Publish Build Artifact"
            inputs:
              pathToPublish: "$(Build.ArtifactStagingDirectory)/publish"
              ArtifactName: "build_artifact"

  # IIS in-process deployment stage (Windows Server 2022+ with IIS)
  - stage: DeployDevToIIS
    displayName: "Deploy Dev to IIS (In-Process)"
    dependsOn: Publish
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['forceDeploy'], 'true')))
    pool:
      name: DVO
    jobs:
      - job: DeployIIS
        displayName: "Deploy pto-track to IIS"
        steps:
          - download: current
            artifact: build_artifact
            displayName: 'Download Build Artifacts'

          - powershell: |
              Write-Host "Listing downloaded artifact at $(Pipeline.Workspace)/build_artifact"
              Get-ChildItem -Recurse "$(Pipeline.Workspace)/build_artifact" | Select-Object FullName
            displayName: 'Debug: List build_artifact contents'
            failOnStderr: false

          - powershell: |
              if (-not (Test-Path "$(Pipeline.Workspace)/build_artifact/scripts/release/iis-prereq-check.ps1")) {
                Get-ChildItem -Recurse "$(Pipeline.Workspace)/build_artifact" | Select-Object FullName
                throw "Missing script: $(Pipeline.Workspace)/build_artifact/scripts/release/iis-prereq-check.ps1"
              }
            displayName: 'Debug: Assert prereq script exists'
            failOnStderr: true

          - powershell: |
              $modulePath = Join-Path $env:ProgramFiles "IIS\Asp.Net Core Module\V2\aspnetcorev2.dll"
              Write-Host "Checking AspNetCoreModuleV2 at $modulePath"
              if (-not (Test-Path $modulePath)) {
                Write-Error "AspNetCoreModuleV2 not found. Install 'ASP.NET Core Module' IIS feature."
              } else { Write-Host "AspNetCoreModuleV2 present." }
            displayName: 'Pre-deploy: Verify AspNetCoreModuleV2'
            failOnStderr: false

          - powershell: |
              & "$(Pipeline.Workspace)/build_artifact/scripts/release/iis-prereq-check.ps1"
            displayName: 'Pre-deploy: Check IIS'
            failOnStderr: false

          - powershell: |
              $PublishPath = "$(Pipeline.Workspace)/build_artifact"
              $DeployPath = "$(deploymentFolder)"
              Write-Host "Copying $PublishPath -> $DeployPath"
              if (Test-Path $DeployPath) { Remove-Item $DeployPath -Recurse -Force }
              Copy-Item -Path $PublishPath -Destination $DeployPath -Recurse -Force
              Write-Host "[OK] Files deployed"
            displayName: 'Deploy: Copy Published Files'
            failOnStderr: false

          - powershell: |
              & "$(Pipeline.Workspace)/build_artifact/scripts/release/prepare-deployment-target.ps1" `
                -DeploymentFolder '$(deploymentFolder)' `
                -BackupFolder '$(deploymentBackupFolder)' `
                -TempFolder '$(tempFolder)' `
                -ServiceAccount '$(appServiceAccount)'
            displayName: 'Pre-deploy: Prepare target & ACLs'
            failOnStderr: false

          - powershell: |
              & "$(Pipeline.Workspace)/build_artifact/scripts/release/before-deploy-iis.ps1" `
                -PhysicalPath '$(deploymentFolder)' `
                -AppPoolUser '$(appServiceAccount)' `
                -StopIISIfNeeded:$false
            displayName: 'Pre-deploy: IIS Checks'
            failOnStderr: false

          - powershell: |
              & "$(Pipeline.Workspace)/build_artifact/scripts/release/set-connection-string.ps1" -ConnectionString "$(sqlConnectionString)"
            displayName: 'Set ConnectionStrings__PtoTrackDbContext'
            failOnStderr: false

          - powershell: |
              $webConfig = "$(deploymentFolder)\web.config"
              $content = Get-Content $webConfig -Raw
              $content = $content -replace '__pto-track-env__', '$(pto-track-env)'
              Set-Content $webConfig -Value $content -NoNewline
              Write-Host "Replaced __pto-track-env__ with $(pto-track-env) in web.config"
            displayName: 'Replace tokens in web.config'
            failOnStderr: false

          - powershell: |
              $logsDir = "$(deploymentFolder)\logs"
              New-Item -ItemType Directory -Force -Path $logsDir | Out-Null
              Write-Host "Created logs directory: $logsDir"
              icacls $logsDir /grant "$(appServiceAccount):(OI)(CI)M" /T
              Write-Host "Granted Modify permissions to $(appServiceAccount) on logs directory"
            displayName: 'Create logs folder and set permissions'
            failOnStderr: false

          - powershell: |
              & "$(Pipeline.Workspace)/build_artifact/scripts/release/finish-deploy-iis.ps1" `
                -WebSiteName '$(websiteName)' `
                -PhysicalPath '$(deploymentFolder)' `
                -AppPoolUser '$(appServiceAccount)' `
                -AppPoolPassword '$(appServiceAccountPassword)'
            displayName: 'Post-deploy: Configure IIS App & Auth'
            failOnStderr: false

          - powershell: |
              & "$(Pipeline.Workspace)/build_artifact/scripts/release/iis-health-check.ps1" -HealthUrl "$(healthUrl)" -TimeoutSeconds 15
            displayName: 'Post-deploy: Health Check'
            failOnStderr: false

          - powershell: |
              $providers = @("ASP.NET Core Module V2", ".NET Runtime")
              $startTime = (Get-Date).AddHours(-2)
              foreach ($p in $providers) {
                Write-Host "=== Events for provider: $p (since $startTime) ==="
                try {
                  Get-WinEvent -FilterHashtable @{ ProviderName = $p; StartTime = $startTime } -ErrorAction Stop |
                    Select-Object TimeCreated, Id, LevelDisplayName, ProviderName, Message |
                    Sort-Object TimeCreated |
                    ForEach-Object {
                      "{0:yyyy-MM-dd HH:mm:ss} [{1}] ({2}) {3}`n{4}" -f $_.TimeCreated, $_.LevelDisplayName, $_.Id, $_.ProviderName, $_.Message
                    }
                } catch {
                  Write-Host "No events or access denied for $p: $($_.Exception.Message)"
                }
              }
            displayName: 'Post-deploy: Export ANCM/.NET errors'
            condition: always()
            failOnStderr: false

          - powershell: |
              $siteName = '$(websiteName)'
              try {
                $site = Get-Website -Name $siteName
                $siteId = $site.Id
                $logDir = Join-Path "C:\inetpub\logs\LogFiles" ("W3SVC{0}" -f $siteId)
                Write-Host "IIS logs dir: $logDir"
                if (Test-Path $logDir) {
                  $latest = Get-ChildItem $logDir -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
                  if ($latest) {
                    Write-Host "Latest IIS log: $($latest.FullName)"
                    Get-Content $latest.FullName -Tail 200
                  } else {
                    Write-Host "No log files found in $logDir"
                  }
                } else {
                  Write-Host "IIS logs folder not found for site '$siteName' at $logDir"
                }
              } catch {
                Write-Host "Failed to tail IIS logs for site '$siteName': $($_.Exception.Message)"
              }
            displayName: 'Post-deploy: Tail IIS logs'
            condition: always()
            failOnStderr: false

          - powershell: |
              $logDir = "$(deploymentFolder)\logs"
              Write-Host "Inspecting stdout logs at $logDir"
              if (Test-Path $logDir) {
                Get-ChildItem -Path $logDir -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1 | ForEach-Object {
                  Write-Host "Latest log: $($_.FullName)"
                  Get-Content -Path $_.FullName -Tail 200
                }
              } else {
                Write-Host "No logs directory found at $logDir"
              }
            displayName: 'Post-deploy: Dump stdout logs'
            condition: always()