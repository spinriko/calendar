# Azure Pipeline for PTO Track

trigger:
  branches:
    include:
      - main

# pr:
#   branches:
#     include:
#       - main

variables:
  - group: "DevOps Automation Accounts"
  - group: "ASBDotNetWebApps-DEV"

  - name: "dotnetVersion"
    value: "8.0.100"

  - name: "efToolVersion"
    value: "8.0.*"

  - name: "typescriptPath"
    value: 'C:\admin\typescript-5.9.3.tgz'

  - name: "esbuildPath"
    value: 'C:\admin\esbuild-0.27.1.tgz'

  - name: "solutionPath"
    value: "**/pto.track.sln"

  - name: "projectPath"
    value: "**/pto.track.csproj"

  - name: "tempFolder"
    value: '$(deploymentFolder)_temp'

  - name: "deploymentBackupFolder"
    value: '$(deploymentFolder)_backup\'

  - name: "webConfigPath"
    value: '$(deploymentFolder)\web.config'

pool:
  name: DVO

stages:
  - stage: Build
    displayName: "Build Solution"
    jobs:
      - job: Build

        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0
            fetchTags: true

          - powershell: |
              & .\scripts\ci\version-tag.ps1 -BuildSourcesDirectory "$(Build.SourcesDirectory)"
            displayName: "Auto-increment version tag"
            failOnStderr: false
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

          - task: UseDotNet@2
            displayName: "Ensure .NET SDK 8.0 Installed"
            condition: false
            inputs:
              packageType: "sdk"
              useGlobalJson: true
              includePreviewVersions: false
              performMultiLevelLookup: true # checks for local installs

          - task: DotNetCoreCLI@2
            displayName: "Ensure dotnet-ef is Installed"
            condition: false
            inputs:
              command: "custom"
              custom: "tool"
              arguments: install --global dotnet-ef --version $(efToolVersion)

          - powershell: |
              $npmDir = Split-Path "$(npmPath)"
              $env:PATH = "$npmDir;$env:PATH"
              & "$(npmPath)" ci --prefix pto.track
            displayName: "Install frontend dependencies (pto.track)"

          - powershell: |
              $npmDir = Split-Path "$(npmPath)"
              $env:PATH = "$npmDir;$env:PATH"
              & "$(npmPath)" run build:js --prefix pto.track
            displayName: "Build frontend assets (pto.track)"

          - task: DotNetCoreCLI@2
            displayName: "Restore NuGet Packages"
            inputs:
              command: "restore"
              projects: "$(solutionPath)"

          - task: DotNetCoreCLI@2
            displayName: "Build Project"
            inputs:
              command: "build"
              projects: "$(solutionPath)"
              arguments: "--configuration Release --no-restore"

  - stage: Test
    displayName: "Run Tests and Coverage"
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - checkout: self

          - powershell: |
              New-Item -ItemType Directory -Force "$(Build.SourcesDirectory)/TestResults/coverage" | Out-Null
            displayName: "Ensure coverage output directory"
            failOnStderr: false

          - powershell: |
              node --version
            displayName: "Check Node.js on agent (Test Job)"
            condition: false

          - powershell: |
              npm --version
            displayName: "Check npm on agent (Test Job)"
            condition: false
            
          # Run JavaScript tests (Jest). Puppeteer Chromium download is skipped
          # to avoid headless/browser installs on restricted build agents.
          # add these back in after downgrading npm
          #- script: |
          #    npm ci --prefix pto.track.tests.js
          #  displayName: "Install JS test dependencies (pto.track.tests.js)"
          #  env:
          #    PUPPETEER_SKIP_DOWNLOAD: true

          #- script: |
          #    npm test --prefix pto.track.tests.js --silent
          #  displayName: "Run JavaScript tests (pto.track.tests.js)"
          #  env:
          #    PUPPETEER_SKIP_DOWNLOAD: true

          - task: DotNetCoreCLI@2
            displayName: "Test Services Layer"
            inputs:
              testRunTitle: "Test Services Layer"
              command: "test"
              projects: "**/pto.track.services.tests.csproj"
              arguments: '--configuration Release --logger "trx;LogFileName=services_tests.trx" --results-directory "$(Build.SourcesDirectory)\TestResults\services" --collect:"XPlat Code Coverage"'
              publishTestResults: false # handled in arguments

          - task: DotNetCoreCLI@2
            displayName: "Test Application Layer"
            inputs:
              testRunTitle: "Test Application Layer"
              command: "test"
              projects: "**/pto.track.tests.csproj"
              arguments: '--configuration Release --logger "trx;LogFileName=app_tests.trx" --results-directory "$(Build.SourcesDirectory)\TestResults\app" --collect:"XPlat Code Coverage"'
              publishTestResults: false # handled in arguments

          - task: DotNetCoreCLI@2
            displayName: "Test Data Layer"
            inputs:
              testRunTitle: "Test Data Layer"
              command: "test"
              projects: "**/pto.track.data.tests.csproj"
              arguments: '--configuration Release --logger "trx;LogFileName=data_tests.trx" --results-directory "$(Build.SourcesDirectory)\TestResults\data" --collect:"XPlat Code Coverage"'
              publishTestResults: false # handled in arguments

          - powershell: |
              & .\scripts\ci\coverage-merge.ps1 -SourcesDirectory "$(Build.SourcesDirectory)"
            displayName: "Merge coverage with ReportGenerator"
            failOnStderr: false
          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "VSTest"
              testResultsFiles: "**/TestResults/**/*.trx"
              mergeTestResults: true
              testRunTitle: "Dotnet Tests"

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: "Cobertura"
              summaryFileLocation: "$(Build.SourcesDirectory)/TestResults/coverage-merged/Cobertura.xml"
              failIfCoverageEmpty: true

          - task: PublishBuildArtifacts@1
            condition: false
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/pto.track.tests.js/save-results.html"
              artifactName: "JavaScriptTestReport"
              publishLocation: "Container"

  - stage: Analyze
    displayName: "Run Analyzers and Metrics"
    dependsOn: Test
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['forceDeploy'], 'true')))
    jobs:
      - job: Analyze
        steps:
          - task: PowerShell@2
            displayName: "Run Roslyn Analyzers"
            inputs:
              filePath: "./scripts/run-analyzers.ps1"
              arguments: "-Execute"

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/artifacts/analyzers"
              artifactName: "analyzers"
              publishLocation: "Container"

          - task: DotNetCoreCLI@2
            displayName: "Build metrics-runner (console)"
            inputs:
              command: "build"
              projects: "**/metrics-runner.csproj"
              arguments: "--configuration Release"

          - task: DotNetCoreCLI@2
            displayName: "Run metrics-runner (console)"
            inputs:
              command: "run"
              projects: "**/metrics-runner"
              arguments: "-- '$(Build.SourcesDirectory)'"

          - task: PowerShell@2
            displayName: "Generate metrics HTML report"
            inputs:
              filePath: "./scripts/ci/metrics-report.ps1"
              arguments: "-MetricsJsonPath '$(System.DefaultWorkingDirectory)/artifacts/metrics/metrics.json' -OutputDirectory '$(System.DefaultWorkingDirectory)/artifacts/metrics-report'"

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/artifacts/metrics"
              artifactName: "metrics"
              publishLocation: "Container"

          - task: PublishBuildArtifacts@1
            displayName: "Publish metrics HTML report"
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/artifacts/metrics-report"
              artifactName: "metrics-report"
              publishLocation: "Container"

  - stage: Publish
    displayName: "Publish Standalone App"
    dependsOn: Analyze
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['forceDeploy'], 'true')))
    jobs:
      - job: Publish
        steps:
          - checkout: self
          - download: current

          - powershell: |
              $npmDir = Split-Path "$(npmPath)"
              $env:PATH = "$npmDir;$env:PATH"
              $projPath = @(Get-ChildItem -Path "$(Build.SourcesDirectory)" -Filter "pto.track.csproj" -Recurse)[0].FullName
              Write-Host "Found project: $projPath"
              & dotnet publish $projPath --configuration Release --runtime win-x64 --self-contained true --output $(Build.ArtifactStagingDirectory)/publish
            displayName: "Generate Self-Contained App"

          - powershell: |
              $dest = "$(Build.ArtifactStagingDirectory)/publish/scripts/release"
              New-Item -ItemType Directory -Force -Path $dest | Out-Null
              Copy-Item -Path "$(Build.SourcesDirectory)/scripts/release" -Destination $dest -Recurse -Force
              Write-Host "Release scripts copied to artifact payload: $dest"
            displayName: "Package release scripts"

          - task: PublishBuildArtifacts@1
            displayName: "Publish Build Artifact"
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)/publish"
              ArtifactName: "build_artifact"

  # IIS in-process deployment stage (Windows Server 2022+ with IIS)
  - stage: DeployDevToIIS
    displayName: "Deploy Dev to IIS (In-Process)"
    dependsOn: Publish
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['forceDeploy'], 'true')))
    pool:
      name: DVO
    jobs:
      - deployment: DeployIIS
        displayName: "Deploy pto-track to IIS"
        strategy:
          runOnce:
            preDeploy:
              steps:
                - powershell: |
                    & "$(Pipeline.Workspace)/build_artifact/scripts/release/iis-prereq-check.ps1"
                  displayName: 'Pre-deploy: Check IIS'
                  failOnStderr: false

            deploy:
              steps:
                - download: current
                  artifact: build_artifact
                  displayName: 'Download Build Artifacts'

                - powershell: |
                    $PublishPath = "$(Pipeline.Workspace)/build_artifact"
                    $DeployPath = "$(deploymentFolder)"
                    Write-Host "Copying $PublishPath -> $DeployPath"
                    if (Test-Path $DeployPath) { Remove-Item $DeployPath -Recurse -Force }
                    Copy-Item -Path $PublishPath -Destination $DeployPath -Recurse -Force
                    Write-Host "[OK] Files deployed"
                  displayName: 'Deploy: Copy Published Files'
                  failOnStderr: false

                - powershell: |
                    & "$(Pipeline.Workspace)/build_artifact/scripts/release/before-deploy-iis.ps1" `
                      -PhysicalPath '$(deploymentFolder)' `
                      -AppPoolUser '$(appServiceAccount)' `
                      -StopIISIfNeeded:$false
                  displayName: 'Pre-deploy: IIS Checks'
                  failOnStderr: false

                - powershell: |
                    & "$(Pipeline.Workspace)/build_artifact/scripts/release/set-connection-string.ps1" -ConnectionString "$(sqlConnectionString)"
                  displayName: 'Set ConnectionStrings__PtoTrackDbContext'
                  failOnStderr: false

                - powershell: |
                    & "$(Pipeline.Workspace)/build_artifact/scripts/release/finish-deploy-iis.ps1" `
                      -PhysicalPath '$(deploymentFolder)' `
                      -AppPoolUser '$(appServiceAccount)'
                  displayName: 'Post-deploy: Configure IIS App & Auth'
                  failOnStderr: false

            postRouteTraffic:
              steps:
                - powershell: |
                    & "$(Pipeline.Workspace)/build_artifact/scripts/release/iis-health-check.ps1" -HealthUrl "$(healthUrl)" -TimeoutSeconds 15
                  displayName: 'Post-deploy: Health Check'
                  failOnStderr: false