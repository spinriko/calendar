# Azure Pipeline for PTO Track

trigger:
  branches:
    include:
      - main

# pr:
#   branches:
#     include:
#       - main

variables:
  - name: "dotnetVersion"
    value: "8.0.100"

  - name: "efToolVersion"
    value: "8.0.*"

  - name: "nodeVersion"
    value: "20.x"

  - name: "typescriptPath"
    value: 'C:\admin\typescript-5.9.3.tgz'

  - name: "esbuildPath"
    value: 'C:\admin\esbuild-0.27.1.tgz'

  - name: "solutionPath"
    value: "**/pto.track.sln"

  - name: "projectPath"
    value: "**/pto.track.csproj"

  - name: "appName"
    value: "pto.track"

  - name: "tempFolder"
    value: 'c:\self-contained_apps\$(appName)_temp'

  - name: "deploymentFolder"
    value: 'c:\self-contained_apps\$(appName)\'

  - name: "deploymentBackupFolder"
    value: 'c:\self-contained_apps\$(appName)_backup\'

  - name: "executablePath"
    value: '$(deploymentFolder)$(appName).exe'

  - name: "serviceName"
    value: "PTO_Track_Service"

  - name: "appPoolName"
    value: "pto-track"

  - name: "serviceDescription"
    value: "PTO Track .NET Core Web Application"

  - name: "webConfigPath"
    value: 'c:\self-contained_apps\$(appName)\web.config'

  - name: "forwardedHttpUrl"
    value: "http://localhost:5139"

  - name: "forwardedHttpsUrl"
    value: "https://localhost:7241"

  # additional variables are pulled from the UI

pool:
  name: DVO

stages:
  - stage: Build
    displayName: "Build Solution"
    jobs:
      - job: Build

        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0
            fetchTags: true

          - powershell: |
              & .\scripts\ci\version-tag.ps1 -BuildSourcesDirectory "$(Build.SourcesDirectory)"
            displayName: "Auto-increment version tag"
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

          - task: UseDotNet@2
            displayName: "Ensure .NET SDK 8.0 Installed"
            condition: false
            inputs:
              packageType: "sdk"
              useGlobalJson: true
              includePreviewVersions: false
              performMultiLevelLookup: true # checks for local installs

          - task: DotNetCoreCLI@2
            displayName: "Ensure dotnet-ef is Installed"
            condition: false
            inputs:
              command: "custom"
              custom: "tool"
              arguments: install --global dotnet-ef --version $(efToolVersion)

          - script: node --version
            displayName: "Check Node.js on agent"          

          - script: npm ci --prefix pto.track
            displayName: "Install frontend dependencies (pto.track)"

          - script: npm run build:js --prefix pto.track
            displayName: "Build frontend assets (pto.track)"

          - task: DotNetCoreCLI@2
            displayName: "Restore NuGet Packages"
            inputs:
              command: "restore"
              projects: "$(solutionPath)"

          - task: DotNetCoreCLI@2
            displayName: "Build Project"
            inputs:
              command: "build"
              projects: "$(solutionPath)"
              arguments: "--configuration Release --no-restore"

  - stage: Test
    displayName: "Run Tests and Coverage"
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - checkout: self

          - powershell: |
              New-Item -ItemType Directory -Force "$(Build.SourcesDirectory)/TestResults/coverage" | Out-Null
            displayName: "Ensure coverage output directory"

          - script: node --version
            displayName: "Check Node.js on agent (Test Job)"          

          - script: npm --version
            displayName: "Check npm on agent (Test Job)"
            
          # Run JavaScript tests (Jest). Puppeteer Chromium download is skipped
          # to avoid headless/browser installs on restricted build agents.
          # add these back in after downgrading npm
          #- script: |
          #    npm ci --prefix pto.track.tests.js
          #  displayName: "Install JS test dependencies (pto.track.tests.js)"
          #  env:
          #    PUPPETEER_SKIP_DOWNLOAD: true

          #- script: |
          #    npm test --prefix pto.track.tests.js --silent
          #  displayName: "Run JavaScript tests (pto.track.tests.js)"
          #  env:
          #    PUPPETEER_SKIP_DOWNLOAD: true

          - task: DotNetCoreCLI@2
            displayName: "Test Services"
            inputs:
              testRunTitle: "Test Services Layer"
              command: "test"
              projects: "**/pto.track.services.tests.csproj"
              arguments: '--configuration Release --logger "trx;LogFileName=services_tests.trx" --results-directory "$(Build.SourcesDirectory)\TestResults\services" --collect:"XPlat Code Coverage"'
              publishTestResults: false # handled in arguments

          - task: DotNetCoreCLI@2
            displayName: "Test App"
            inputs:
              testRunTitle: "Test Application Layer"
              command: "test"
              projects: "**/pto.track.tests.csproj"
              arguments: '--configuration Release --logger "trx;LogFileName=app_tests.trx" --results-directory "$(Build.SourcesDirectory)\TestResults\app" --collect:"XPlat Code Coverage"'
              publishTestResults: false # handled in arguments

          - task: DotNetCoreCLI@2
            displayName: "Test Data Layer"
            inputs:
              testRunTitle: "Test Data"
              command: "test"
              projects: "**/pto.track.data.tests.csproj"
              arguments: '--configuration Release --logger "trx;LogFileName=data_tests.trx" --results-directory "$(Build.SourcesDirectory)\TestResults\data" --collect:"XPlat Code Coverage"'
              publishTestResults: false # handled in arguments

          - powershell: |
              & .\scripts\ci\coverage-merge.ps1 -SourcesDirectory "$(Build.SourcesDirectory)"
            displayName: "Merge coverage with ReportGenerator"
          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "VSTest"
              testResultsFiles: "**/TestResults/**/*.trx"
              mergeTestResults: true
              testRunTitle: "Dotnet Tests"

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: "Cobertura"
              summaryFileLocation: "$(Build.SourcesDirectory)/TestResults/coverage-merged/Cobertura.xml"
              failIfCoverageEmpty: true

          - task: PublishBuildArtifacts@1
            condition: false
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/pto.track.tests.js/save-results.html"
              artifactName: "JavaScriptTestReport"
              publishLocation: "Container"

  - stage: Analyze
    displayName: "Run Analyzers and Metrics"
    dependsOn: Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Analyze
        steps:
          - task: PowerShell@2
            displayName: "Run Roslyn Analyzers"
            inputs:
              filePath: "./scripts/run-analyzers.ps1"
              arguments: "-Execute"

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/artifacts/analyzers"
              artifactName: "analyzers"
              publishLocation: "Container"

          - task: DotNetCoreCLI@2
            displayName: "Build metrics-runner (console)"
            inputs:
              command: "build"
              projects: "**/metrics-runner.csproj"
              arguments: "--configuration Release"

          - task: DotNetCoreCLI@2
            displayName: "Run metrics-runner (console)"
            inputs:
              command: "run"
              projects: "**/metrics-runner"
              arguments: "-- '$(Build.SourcesDirectory)'"

          - task: PowerShell@2
            displayName: "Generate metrics HTML report"
            inputs:
              filePath: "./scripts/ci/metrics-report.ps1"
              arguments: "-MetricsJsonPath '$(System.DefaultWorkingDirectory)/artifacts/metrics/metrics.json' -OutputDirectory '$(System.DefaultWorkingDirectory)/artifacts/metrics-report'"

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/artifacts/metrics"
              artifactName: "metrics"
              publishLocation: "Container"

          - task: PublishBuildArtifacts@1
            displayName: "Publish metrics HTML report"
            inputs:
              pathToPublish: "$(System.DefaultWorkingDirectory)/artifacts/metrics-report"
              artifactName: "metrics-report"
              publishLocation: "Container"

  - stage: Publish
    displayName: "Publish Standalone App"
    dependsOn: Analyze
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Publish
        steps:
          - checkout: none
          - download: current

          - task: DotNetCoreCLI@2
            displayName: "Generate Self-Contained App"
            inputs:
              command: "publish"
              publishWebProjects: false
              projects: "$(projectPath)"
              arguments: >
                --configuration Release
                --runtime win-x64
                --self-contained true
                --output $(Build.ArtifactStagingDirectory)/publish

          - task: PublishBuildArtifacts@1
            displayName: "Publish Build Artifact"
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)/publish"
              ArtifactName: "build_artifact"

  - stage: DeployDev
    displayName: "Deploy to Development Server"
    dependsOn: Publish
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      - group: "DevOps Automation Accounts"
      - group: "ASBDotNetWebApps-DEV"
    jobs:
      - job: Deploy

        steps:
          - checkout: none
          - download: current

          - task: PowerShellOnTargetMachines@3
            displayName: "Check IIS Installation"
            inputs:
              Machines: "$(webServerDev)"
              UserName: "$(automationAcctName)"
              UserPassword: "$(automationAcctPass)"
              ScriptPath: '$(Build.SourcesDirectory)\scripts\release\check-iis-installed.ps1'
              ScriptArguments: '-FeatureName "Web-Server"'
              CommunicationProtocol: "Http"

          - task: PowerShellOnTargetMachines@3
            displayName: "Stop and remove current service"
            inputs:
              Machines: "$(webServerDev)"
              UserName: "$(automationAcctName)"
              UserPassword: "$(automationAcctPass)"
              ScriptPath: '$(Build.SourcesDirectory)\scripts\release\stop-and-remove-service.ps1'
              ScriptArguments: '-ServiceName "$(serviceName)"'
              CommunicationProtocol: "Http"

          - task: WindowsMachineFileCopy@2
            displayName: "Copy Build Artifact to Web Server"
            inputs:
              SourcePath: "$(Pipeline.Workspace)/build_artifact/pto.track.zip"
              MachineNames: "$(webServerDev)"
              AdminUserName: "$(automationAcctName)"
              AdminPassword: "$(automationAcctPass)"
              TargetPath: '\\$(webServerDev)\$(tempFolder)\'
              CleanTargetBeforeCopy: true

          - task: PowerShellOnTargetMachines@3
            displayName: "Extract Artifact"
            inputs:
              Machines: "$(webServerDev)"
              UserName: "$(automationAcctName)"
              UserPassword: "$(automationAcctPass)"
              ScriptPath: '$(Build.SourcesDirectory)\scripts\release\extract-artifact.ps1'
              ScriptArguments: '-SourceFolder "$(tempFolder)" -DestinationFolder "$(tempFolder)"'
              CommunicationProtocol: "Http"

          - task: PowerShellOnTargetMachines@3
            displayName: "Set ASPNETCORE_ENVIRONMENT=$(pto-track-env) (Machine)"
            inputs:
              Machines: "$(webServerDev)"
              UserName: "$(automationAcctName)"
              UserPassword: "$(automationAcctPass)"
              ScriptPath: '$(Build.SourcesDirectory)\scripts\release\set-environment.ps1'
              ScriptArguments: '-EnvironmentName "$(pto-track-env)"'
              CommunicationProtocol: "Http"

          - task: PowerShellOnTargetMachines@3
            displayName: "Set ConnectionStrings__PtoTrackDbContext from variable group"
            inputs:
              Machines: "$(webServerDev)"
              UserName: "$(automationAcctName)"
              UserPassword: "$(automationAcctPass)"
              ScriptPath: '$(Build.SourcesDirectory)\scripts\release\set-connection-string.ps1'
              ScriptArguments: '-ConnectionString "$(sqlConnectionString)"'
              CommunicationProtocol: "Http"

          - task: PowerShellOnTargetMachines@3
            displayName: "Replace Previous App Files/Folders"
            inputs:
              Machines: "$(webServerDev)"
              UserName: "$(automationAcctName)"
              UserPassword: "$(automationAcctPass)"
              ScriptPath: '$(Build.SourcesDirectory)\scripts\release\swap-deployment-folders.ps1'
              ScriptArguments: '-DeploymentPath "$(deploymentFolder)" -BackupPath "$(deploymentBackupFolder)" -TempPath "$(tempFolder)"'
              CommunicationProtocol: "Http"

          - task: PowerShellOnTargetMachines@3
            displayName: "Update IIS Rewrite Rules"
            condition: false # disabled until further testing and evaluation
            inputs:
              Machines: "$(webServerDev)"
              UserName: "$(automationAcctName)"
              UserPassword: "$(automationAcctPass)"
              ScriptPath: '$(Build.SourcesDirectory)\scripts\release\update-rewrite-rules.ps1'
              ScriptArguments: '-WebConfigPath "$(webConfigPath)" -ForwardedHttpUrl "$(forwardedHttpUrl)" -ForwardedHttpsUrl "$(forwardedHttpsUrl)"'
              CommunicationProtocol: "Http"

          - task: PowerShellOnTargetMachines@3
            displayName: "Create New Windows Service And Start"
            inputs:
              Machines: "$(webServerDev)"
              UserName: "$(automationAcctName)"
              UserPassword: "$(automationAcctPass)"
              ScriptPath: '$(Build.SourcesDirectory)\scripts\release\create-windows-service.ps1'
              ScriptArguments: '-ServiceName "$(serviceName)" -ExecutablePath "$(executablePath)" -ServiceAccountName "$(serviceAccountName)" -ServiceAccountPassword "$(serviceAccountPassword)" -ServiceDescription "$(serviceDescription)"'
              CommunicationProtocol: "Http"

  # Optional IIS in-process deployment stage (Windows Server 2022+ with IIS)
  # Enable by setting: deployToIIS=true in variable group or uncommenting condition
  - stage: DeployToIIS
    displayName: "Deploy to IIS (In-Process)"
    dependsOn: Build
    condition: false  # Change to: eq(variables['deployToIIS'], 'true')
    jobs:
      - deployment: DeployIIS
        displayName: "Deploy pto-track to IIS"
        environment: 'production'
        strategy:
          runOnce:
            preDeploy:
              steps:
                - powershell: |
                    & .\scripts\release\iis-prereq-check.ps1
                  workingDirectory: '$(Build.SourcesDirectory)'
                  displayName: 'Pre-deploy: Check IIS'

            deploy:
              steps:
                - download: current
                  artifact: drop
                  displayName: 'Download Build Artifacts'

                - powershell: |
                    $PublishPath = "$(Pipeline.Workspace)/drop/pto-track"
                    $DeployPath = "C:\inetpub\wwwroot\pto-track"
                    Write-Host "Copying $PublishPath → $DeployPath"
                    if (Test-Path $DeployPath) { Remove-Item $DeployPath -Recurse -Force }
                    Copy-Item -Path $PublishPath -Destination $DeployPath -Recurse -Force
                    Write-Host "✓ Files deployed"
                  displayName: 'Deploy: Copy Published Files'

                - powershell: |
                    & .\scripts\release\before-deploy-iis.ps1 `
                      -PhysicalPath 'C:\inetpub\wwwroot\pto-track' `
                      -AppPoolUser 'IIS APPPOOL\pto-track' `
                      -StopIISIfNeeded:$false
                  workingDirectory: '$(Build.SourcesDirectory)'
                  displayName: 'Pre-deploy: IIS Checks'

                - powershell: |
                    & .\scripts\release\finish-deploy-iis.ps1 `
                      -PhysicalPath 'C:\inetpub\wwwroot\pto-track' `
                      -AppPoolUser 'IIS APPPOOL\pto-track'
                  workingDirectory: '$(Build.SourcesDirectory)'
                  displayName: 'Post-deploy: Configure IIS App & Auth'

            postRouteTraffic:
              steps:
                - powershell: |
                    & .\scripts\release\iis-health-check.ps1 -HealthUrl "https://localhost/pto-track/health" -TimeoutSeconds 15
                  workingDirectory: '$(Build.SourcesDirectory)'
                  displayName: 'Post-deploy: Health Check'